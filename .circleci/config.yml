# Use the latest 2.1 version of CircleCI pipeline process engine.
version: 2.1

# Define jobs
jobs:
  # Job 1: Setup Environment and Install All Dependencies
  build:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: "Install UV and Add to Path"
          command: |
            curl -LsSf https://astral.sh/uv/install.sh | sh
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            uv --version
      - run:
          name: "Create Virtual Env & Install Dependencies via UV Sync"
          command: |
            uv venv --python 3.11
            source .venv/bin/activate
            uv sync --all-packages --extra dev --verbose
      - run:
          name: "Verify Installation"
          command: |
            source .venv/bin/activate
            uv tree
            ruff --version
            pytest --version
            mypy --version
            coverage --version
      - run:
          name: "Format code with ruff"
          command: |
            source .venv/bin/activate
            uv run ruff format .
      - persist_to_workspace:
          root: .
          paths:
            - .

  # Job 2: Linting and Formatting Checks
  lint:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Run Linting and Formatting Checks"
          command: |
            source .venv/bin/activate
            uv run ruff check .

  # Job 3: Unit Tests and Coverage
  unit_test:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Activate Venv and Create Test Results Directory"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/unit
      - run:
          name: "Execute Unit Test Suite"
          command: |
            source .venv/bin/activate
            pytest src/ --cov=src --cov-report=xml --cov-report=term \
                     --junitxml=test-results/unit/junit.xml \
                     --cov-fail-under=85
      - run:
          name: "Run Static Analysis (mypy)"
          command: |
            source .venv/bin/activate
            uv add types-requests
            mypy src/ --explicit-package-bases
      - store_test_results:
          path: test-results/unit
      - store_artifacts:
          path: coverage.xml
      - store_artifacts:
          path: test-results/unit

  # Job 4: CircleCI Integration Tests (Except Local Credentials)
  circleci_test:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Activate Venv and Create Test Results Directory"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/circleci
      - run:
          name: "Execute All Tests Except Local Credentials"
          command: |
            source .venv/bin/activate
            pytest src/ tests/ -m "not local_credentials" \
                   --junitxml=test-results/circleci/junit.xml -v \
                   --cov=src --cov-report=term
      - store_test_results:
          path: test-results/circleci
      - store_artifacts:
          path: test-results/circleci

  # Job 5: Integration Tests with Real Credentials
  integration_test:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Verify Environment Variables for Integration"
          command: |
            echo "Checking for required environment variables..."
            missing=""
            for var in DISCORD_CLIENT_ID DISCORD_CLIENT_SECRET DISCORD_REDIRECT_URI DISCORD_PUBLIC_KEY DISCORD_BOT_TOKEN \
                       OPENAI_API_KEY CLAUDE_API_KEY NO_AUTH TRELLO_API_KEY TRELLO_API_SECRET; do
              if [ -z "${!var}" ]; then
                missing="$missing $var"
              fi
            done
            if [ -n "$missing" ]; then
              echo "WARNING: Missing environment variables:$missing. Integration tests may be skipped or fail."
            else
              echo "All required environment variables are present."
            fi
      - run:
          name: "Activate Venv and Create Test Results Directory"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/integration
      - run:
          name: "Execute Integration Test Suite with Real API Calls"
          command: |
            source .venv/bin/activate
            pytest -m "integration and not local_credentials" \
                   --junitxml=test-results/integration/junit.xml -v \
                   --no-cov
      - store_test_results:
          path: test-results/integration
      - store_artifacts:
          path: test-results/integration

  # Job 6: End-to-end Tests (E2E)
  e2e_test:
    docker:
      - image: cimg/python:3.11
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Verify Environment Variables for E2E"
          command: |
            echo "Checking for required environment variables..."
            missing=""
            for var in DISCORD_CLIENT_ID DISCORD_CLIENT_SECRET DISCORD_REDIRECT_URI DISCORD_PUBLIC_KEY DISCORD_BOT_TOKEN \
                       OPENAI_API_KEY CLAUDE_API_KEY NO_AUTH TRELLO_API_KEY TRELLO_API_SECRET; do
              if [ -z "${!var}" ]; then
                missing="$missing $var"
              fi
            done
            if [ -n "$missing" ]; then
              echo "WARNING: Missing environment variables:$missing. E2E tests may be skipped or fail."
            else
              echo "All required environment variables are present."
            fi
      - run:
          name: "Activate Venv and Create E2E Test Results Directory"
          command: |
            source .venv/bin/activate
            mkdir -p test-results/e2e
      - run:
          name: "Execute E2E Test Suite"
          command: |
            source .venv/bin/activate
            uv run pytest -m e2e \
                   --junitxml=test-results/e2e/junit.xml -v --no-cov
      - store_test_results:
          path: test-results/e2e
      - store_artifacts:
          path: test-results/e2e

  # Job 7: Report Summary
  report_summary:
    docker:
      - image: cimg/base:stable
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Summarize Unit Test Results"
          command: |
            echo "--- Unit Test Summary ---"
            if [ -f test-results/unit/junit.xml ]; then
              echo "Unit test results file found."
            else
              echo "Unit test results file not found."
            fi
      - run:
          name: "Summarize CircleCI Test Results"
          command: |
            echo "--- CircleCI Test Summary ---"
            if [ -f test-results/circleci/junit.xml ]; then
              echo "CircleCI test results file found."
            else
              echo "CircleCI test results file not found."
            fi
      - run:
          name: "Summarize Integration Test Results"
          command: |
            echo "--- Integration Test Summary ---"
            if [ -f test-results/integration/junit.xml ]; then
              echo "Integration test results file found."
            else
              echo "Integration test results file not found."
            fi
      - run:
          name: "Summarize E2E Test Results"
          command: |
            echo "--- E2E Test Summary ---"
            if [ -f test-results/e2e/junit.xml ]; then
              echo "E2E test results file found."
            else
              echo "E2E test results file not found."
            fi
      - run:
          name: "Display Coverage Info"
          command: |
            echo "--- Coverage Summary ---"
            if [ -f coverage.xml ]; then
               echo "Coverage XML found. Check artifacts for details."
            else
               echo "Coverage XML not found."
            fi


  # Job 8: Deploy to Cloud Repository
  deploy:
    docker:
      - image: cimg/gcp:2025.01  # GCP image with gcloud installed
    steps:
      - checkout
      - setup_remote_docker   # enables docker build

      - run:
          name: Configure GCP Authentication
          command: |
            # Save the service key and activate account
            echo "$GOOGLE_SERVICE_KEY" > $HOME/gcloud-key.json
            gcloud auth activate-service-account --key-file=$HOME/gcloud-key.json
            gcloud config set project $GOOGLE_PROJECT_ID
            gcloud config set run/region us-central1
            gcloud auth configure-docker us-central1-docker.pkg.dev -q

      - run:
          name: Build and Push Docker Image
          command: |
            IMAGE="us-central1-docker.pkg.dev/$GOOGLE_PROJECT_ID/ospsd-repo/ospsd-service:latest"
            docker build -t "$IMAGE" .
            docker push "$IMAGE"


  # Job 9: Terraform Apply
  terraform_apply:
    docker:
      - image: hashicorp/terraform:1.5.7
    steps:
      - checkout
      - run:
          name: "Configure GCP Credentials for Terraform"
          command: |
            set -e

            echo "Writing GCP service account key..."
            echo "$GOOGLE_SERVICE_KEY" > /tmp/gcloud-key.json

            # Persist env vars for ALL future steps
            echo 'export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcloud-key.json' >> $BASH_ENV
            echo "export GOOGLE_PROJECT=$GOOGLE_PROJECT_ID" >> $BASH_ENV

            # Source immediately for THIS step
            source $BASH_ENV

            echo "GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS"
            echo "Using project: $GOOGLE_PROJECT"

      - run:
          name: "Debug: Terraform identity (no jq)"
          command: |
            source $BASH_ENV
            echo "Credentials file path:"
            echo "$GOOGLE_APPLICATION_CREDENTIALS"
            echo "Service account email:"
            sed -n 's/.*"client_email": "\(.*\)".*/\1/p' "$GOOGLE_APPLICATION_CREDENTIALS"

      - run:
          name: "Terraform Init"
          command: |
            source $BASH_ENV
            cd terraform
            terraform init -input=false

      - run:
          name: "Terraform Plan"
          command: |
            source $BASH_ENV
            cd terraform
            terraform plan -out=tfplan -input=false

      - run:
          name: "Terraform Apply"
          command: |
            source $BASH_ENV
            cd terraform
            terraform apply -auto-approve tfplan


# Workflows
workflows:
  pipeline:
    jobs:
      - build
      - lint:
          requires:
            - build
      - unit_test:
          requires:
            - build
      - circleci_test:
          requires:
            - unit_test
      - integration_test:
          requires:
            - circleci_test
      - e2e_test:
          requires:
            - integration_test
      - report_summary:
          requires:
            - unit_test
            - circleci_test
            - integration_test
            - e2e_test
      - deploy:
          requires:
            - report_summary
          filters:
            branches:
              only:
                - hw3-final
      - terraform_apply:
          requires:
            - deploy
          filters:
            branches:
              only:
                - hw3-final