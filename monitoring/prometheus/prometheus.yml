# Prometheus configuration for OSPSD service
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ospsd-monitor'

# Scrape configurations
scrape_configs:
  # OSPSD Service metrics
  - job_name: 'ospsd'
    static_configs:
      - targets: ['ospsd-service:8000']
        labels:
          service: 'ospsd'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 10s
