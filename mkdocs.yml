site_name: Mail Client Project
site_description: "A professional-grade template for a modern Python project."

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - content.code.copy

nav:
  - Overview: index.md
  - Architecture: component.md
  - Testing: testing.md
  - CircleCI: circleci-setup.md
  - API Reference:
      - Mail Client API: api/mail_client_api.md
      - Gmail Client Implementation: api/gmail_client_impl.md
      - Mail Client Service Adapter: api/mail_client_service_adapter.md
      - Mail Client Service Client: api/mail_client_service_client.md
      - Mail Client Service: api/mail_client_service.md
      - Discord Client Implementation: api/discord_client_impl.md
      - Discord Client Service Adapter: api/discord_client_service_adapter.md
      - Discord Client Service: api/discord_client_service.md
      - Chat Client API: api/chat_client_api.md
      - Discord Client Service Client: api/discord_client_service_client.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            extra:
              # This helps mkdocstrings find packages in the src directories of workspace members
              search_paths:
                - src/mail_client_api/src
                - src/gmail_client_impl/src
                - src/mail_client_service_adapter/src
                - src/services/mail_client_service/src
                - src/clients/mail_client_service_client
                - src/discord_client_impl/src
                - src/discord_client_service_adapter/src
                - src/clients/discord_client_service_client

              show_source: false
              docstring_section_style: spacy
              members_order: source
