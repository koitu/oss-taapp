repos:
- repo: https://github.com/astral-sh/uv-pre-commit
  rev: 0.9.2 # Use a specific uv version
  hooks:
    - id: uv-lock # Keeps uv.lock in sync

- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.13.2
  hooks:
    # Run the linter.
    - id: ruff-check
    # Run the formatter.
    - id: ruff-format

- repo: local
  # Run MyPy tests
  hooks:
    - id: mypy
      name: mypy
      entry: uv run mypy src tests
      language: system
      pass_filenames: false
      types: [python]

- repo: local
  # Run unit tests
  hooks:
    - id: pytest
      name: pytest
      entry: uv run pytest src
      language: system
      pass_filenames: false
      types: [python]
